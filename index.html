<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jazz Standard Connections</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Jazz Standard Head Connections</h1>
      <p class="subtitle">Melodies that share the same starting notes</p>
    </header>

    <div id="controls">
      <div class="control-group">
        <label for="depth-slider">Match depth: <span id="depth-label">1</span> note</label>
        <input type="range" id="depth-slider" min="1" max="8" value="1" step="1">
      </div>
      <div class="control-group">
        <label>
          <input type="checkbox" id="show-labels" checked>
          Show labels
        </label>
      </div>
      <button id="editor-toggle">+ Add / Edit Standard</button>
    </div>

    <div id="graph-container">
      <svg id="graph"></svg>
      <div id="tooltip" class="hidden"></div>
    </div>

    <div id="detail-panel" class="hidden">
      <button id="close-detail">×</button>
      <h2 id="detail-title"></h2>
      <p id="detail-meta"></p>
      <div id="detail-melody"></div>
      <div id="detail-connections"></div>
      <button id="play-btn">▶ Play Melody</button>
    </div>

    <div id="editor-panel" class="hidden">
      <h2>Add / Edit Standard</h2>
      <button id="close-editor">×</button>
      <form id="editor-form">
        <label>Title<input type="text" name="title" required></label>
        <label>Composer<input type="text" name="composer"></label>
        <label>Key<input type="text" name="key" placeholder="e.g. C, Bb, Am"></label>
        <label>Time Signature<input type="text" name="time_signature" placeholder="e.g. 4/4"></label>
        <label>Tempo (BPM)<input type="number" name="tempo" min="40" max="400" value="120"></label>
        <label>
          Scale Degrees (comma-separated)
          <input type="text" name="scale_degrees" placeholder="e.g. 8,7,6,5,4,3,2,1" required>
          <small>Use 1–8 where 8 = octave. Chromatic: 1=root, 2=2nd, 3=3rd, 4=4th, 5=5th, 6=6th, 7=7th, 8=octave</small>
        </label>
        <label>
          Note Durations (comma-separated, optional)
          <input type="text" name="durations" placeholder="e.g. 1,0.5,0.5,1,2">
        </label>
        <div class="form-actions">
          <button type="submit">Save</button>
          <button type="button" id="export-btn">Export JSON</button>
          <button type="button" id="import-btn">Import JSON</button>
          <input type="file" id="import-file" accept=".json" style="display:none">
        </div>
      </form>
      <div id="standards-list"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
  <script src="app.js"></script>
</body>
</html>
